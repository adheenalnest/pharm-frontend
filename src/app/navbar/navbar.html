<header class="navbar">

  <!-- Row 1: Main bar -->
  <div class="navbar-top">
    <div class="navbar-top-inner">

      <!-- Logo -->
      <a routerLink="/" class="logo">
        <div class="logo-brand">
          <img src="https://assets.pharmeasy.in/apothecary/images/logo_big.svg" alt="PharmEasy" height="30">
        </div>
      </a>

      <div class="navbar-divider"></div>

      <!-- Express Delivery -->
      <div class="delivery">
        <div class="delivery-label">
          <svg class="delivery-lightning" fill="currentColor" viewBox="0 0 24 24">
            <path d="M13 0L0 13h9v11L22 11h-9z"/>
          </svg>
          Express delivery to
        </div>
        <button class="delivery-btn">
          400001 Mumbai
          <svg class="chevron-right" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <div class="nav-spacer"></div>

      <!-- Right Actions -->
      <div class="nav-actions">

        <!-- Login / Account -->
        <button class="nav-btn" (click)="goToProfile()">
          <div class="nav-btn-icon">
            <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            @if (!auth.isLoggedIn()) {
              <span class="notification-dot"></span>
            }
          </div>
          @if (auth.isLoggedIn()) {
            <span class="nav-label">My Account</span>
          } @else {
            <span class="nav-label">Hello, Log in</span>
          }
        </button>

        <!-- Offers -->
        <button class="nav-btn">
          <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="nav-label">Offers</span>
        </button>

        <!-- Cart -->
        <a routerLink="/cart" class="nav-btn nav-btn-cart">
          <div class="nav-cart-wrap">
            <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            @if (cart.count > 0) {
              <span class="cart-count-badge">{{ cart.count }}</span>
            }
          </div>
          <span class="nav-label">Cart</span>
        </a>

        <!-- Hamburger -->
        <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Toggle menu">
          @if (mobileMenuOpen) {
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          } @else {
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          }
        </button>

      </div>
    </div>
  </div>

  <!-- Row 2: Category nav -->
  <div class="navbar-cat">
    <div class="navbar-cat-inner">
      <nav>
        <ul class="cat-nav">
          <li><a routerLink="/medicine">Medicine</a></li>
          <li>
            <a routerLink="/healthcare">Healthcare
              <svg class="chevron-down" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
              </svg>
            </a>
          </li>
          <li><a routerLink="/doctor-consult">Doctor Consult</a></li>
          <li><a routerLink="/plus" class="plus-link">PLUS</a></li>
          <li>
            <a routerLink="/health-insights">Health Blogs
              <svg class="chevron-down" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
              </svg>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen) {
    <div class="mobile-menu">
      <div class="mobile-delivery">
        <svg class="delivery-lightning" fill="currentColor" viewBox="0 0 24 24">
          <path d="M13 0L0 13h9v11L22 11h-9z"/>
        </svg>
        <span>Express delivery to</span>
        <strong>400001 Mumbai</strong>
      </div>
      <nav class="mobile-nav">
        <a routerLink="/medicine">Medicine</a>
        <a routerLink="/healthcare">Healthcare</a>
        <a routerLink="/doctor-consult">Doctor Consult</a>
        <a routerLink="/plus" class="plus-link">PLUS</a>
        <a routerLink="/health-insights">Health Insights</a>
        <a routerLink="/profile" (click)="mobileMenuOpen = false">My Account</a>
      </nav>
    </div>
  }

</header>
